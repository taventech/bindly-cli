name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  publish-npm:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # npm provenance
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Publish to npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  binaries:
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the release and upload assets
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"
      - run: bun install
      - name: Build standalone binaries
        run: |
          set -e
          mkdir -p dist-bin
          build() { bun build ./src/index.ts --compile --target="$1" --outfile "dist-bin/$2"; }
          build bun-darwin-arm64 bindly-darwin-arm64
          build bun-darwin-x64   bindly-darwin-x64
          build bun-linux-x64    bindly-linux-x64
          build bun-linux-arm64  bindly-linux-arm64
      - name: Checksums
        run: |
          cd dist-bin
          shasum -a 256 bindly-* > SHA256SUMS
          cat SHA256SUMS
      - name: Upload release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes \
            dist-bin/bindly-darwin-arm64 \
            dist-bin/bindly-darwin-x64 \
            dist-bin/bindly-linux-x64 \
            dist-bin/bindly-linux-arm64 \
            dist-bin/SHA256SUMS \
            install.sh \
          || gh release upload "$GITHUB_REF_NAME" \
            dist-bin/bindly-darwin-arm64 \
            dist-bin/bindly-darwin-x64 \
            dist-bin/bindly-linux-x64 \
            dist-bin/bindly-linux-arm64 \
            dist-bin/SHA256SUMS \
            install.sh \
            --clobber
